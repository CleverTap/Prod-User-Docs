name: Sync Master to Prod Master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v1.8.0
        with:
          app_id: ${{ secrets.USER_DOCS_APP_ID }}
          private_key: ${{ secrets.USER_DOCS_APP_KEY }}
          installation_id: ${{ secrets.USER_DOCS_STAGING_INSTALLATION_ID }}

      - name: Configure Git
        run: |
          git config --global user.name "user-docs-bot"
          git config --global user.email "bot@clevertap.com"

      - name: Clone staging master
        run: |
          git clone --branch master https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/CleverTap/Staging-User-Docs.git repo

      - name: Remove .github folder
        run: |
          rm -rf repo/.github

      - name: Clone prod and sync
        run: |
          git clone --branch master https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/CleverTap/Prod-User-Docs.git prod-repo
          cd prod-repo
          find . -not -path './.git/*' -not -path './.github/*' -not -name '.git' -not -name '.github' -delete
          cp -r ../repo/. .
          git add -A
          git diff --staged --quiet || git commit -m "sync: staging master to prod master [skip ci]"
          git push origin master --force
