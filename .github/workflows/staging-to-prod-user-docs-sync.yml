name: Sync Master to Prod Master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git
        run: |
          git config --global user.name "user-docs-bot"
          git config --global user.email "bot@clevertap.com"

      - name: Clone staging and push to prod
        env:
          PROD_PAT: ${{ secrets.PROD_PAT }}
        run: |
          git clone --branch master https://x-access-token:${PROD_PAT}@github.com/CleverTap/Staging-User-Docs.git repo
          cd repo
          git remote add prod https://x-access-token:${PROD_PAT}@github.com/CleverTap/Prod-User-Docs.git
          git push prod master:master --force
