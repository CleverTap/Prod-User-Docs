name: Forward Prod-User-Docs PR to Staging-User-Docs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  forward:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.USER_DOCS_APP_ID }}
          private_key: ${{ secrets.USER_DOCS_APP_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "user-docs-bot"
          git config --global user.email "bot@clevertap.com"

      - name: Push branch to staging repo
        run: |
          git remote add staging https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/CleverTap/Staging-User-Docs.git
          git push staging HEAD:external-${{ github.event.pull_request.number }}-${{ github.head_ref }}

      - name: Create PR in staging repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
          --repo CleverTap/Staging-User-Docs \
          --base develop \
          --head external-${{ github.event.pull_request.number }}-${{ github.head_ref }} \
          --title "External PR: ${{ github.event.pull_request.title }}" \
          --body "Forwarded from public repo PR #${{ github.event.pull_request.number }}"

      - name: Comment on public PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
          --body "Thank you for your contribution! Your PR has been forwarded to our internal repo for review."

      - name: Close public PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr close ${{ github.event.pull_request.number }}