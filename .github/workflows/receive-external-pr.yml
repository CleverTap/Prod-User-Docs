name: Receive External PR

on:
  repository_dispatch:
    types: [external-pr-forward]

permissions:
  contents: write
  pull-requests: write

jobs:
  forward:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout staging repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "user-docs-bot"
          git config --global user.email "bot@clevertap.com"

      - name: Prepare branch
        run: |
          SAFE_REF=$(echo "${{ github.event.client_payload.head_ref }}" | tr -cd '[:alnum:]-_.' | cut -c1-50)
          BRANCH_NAME="external-${{ github.event.client_payload.pr_number }}-${SAFE_REF}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

      - name: Fetch PR branch from public repo
        run: |
          git remote add public https://github.com/CleverTap/Prod-User-Docs.git
          git fetch public refs/heads/${{ github.event.client_payload.head_ref }}:refs/remotes/public/${{ github.event.client_payload.head_ref }}

          git checkout -b $BRANCH_NAME public/${{ github.event.client_payload.head_ref }}

      - name: Remove workflow files (security fix)
        run: |
          rm -rf .github/workflows || true
          git add .
          git commit -m "Remove workflow files from external PR" || echo "No changes"

      - name: Push branch to staging repo
        run: |
          git push origin $BRANCH_NAME --force

      - name: Create PR in staging repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --repo CleverTap/Staging-User-Docs \
            --head "$BRANCH_NAME" \
            --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --repo CleverTap/Staging-User-Docs \
              --base develop \
              --head "$BRANCH_NAME" \
              --title "External PR: ${{ github.event.client_payload.pr_title }}" \
              --body "Forwarded from public PR: ${{ github.event.client_payload.pr_url }}"
          else
            echo "PR already exists (#$EXISTING)"
          fi
