name: Sync Staging-User-Docs master to Prod-User-Docs

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout staging repo
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Push to Prod-User-Docs repo
        env:
          TOKEN: ${{ secrets.PROD_REPO_TOKEN }}
        run: |
          git remote add prod https://$TOKEN@github.com/CleverTap/Prod-User-Docs.git
          git push prod master --force